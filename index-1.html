<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Open Wheel Racer — Ultra 3D Graphics</title>
<style>
  html,body{height:100%;margin:0;background:#0a0e27;color:#fff;font-family:Inter,Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
  #game-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;width:100%;height:100%;background:linear-gradient(135deg,#1a1f3a 0%,#0f1729 100%)}
  .ui{position:fixed;left:0;right:0;bottom:10px;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none}
  .btn{width:86px;height:86px;border-radius:44px;background:linear-gradient(180deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.15);box-shadow:0 8px 32px rgba(0,0,0,0.3);transition:all 0.2s;pointer-events:auto}
  .btn:active{transform:scale(0.95);background:linear-gradient(180deg,rgba(255,255,255,0.2),rgba(255,255,255,0.1))}
  .center-ui{position:fixed;left:50%;transform:translateX(-50%);top:10px;background:rgba(0,0,0,0.6);padding:12px 20px;border-radius:12px;font-weight:600;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.4);font-size:14px;letter-spacing:1px}
  .hud{position:fixed;right:12px;top:70px;background:rgba(0,0,0,0.6);padding:12px 16px;border-radius:12px;text-align:right;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 8px 32px rgba(0,0,0,0.4);font-size:12px}
  .credits{position:fixed;left:10px;bottom:10px;opacity:0.5;font-size:11px}
  #finish{position:fixed;left:50%;top:40%;transform:translateX(-50%);font-size:56px;display:none;padding:20px 40px;border-radius:12px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;box-shadow:0 20px 60px rgba(255,107,53,0.4);font-weight:700;letter-spacing:2px;z-index:100}
  .mini-map{position:fixed;right:12px;bottom:12px;width:120px;height:120px;background:rgba(0,0,0,0.7);border:2px solid rgba(255,255,255,0.2);border-radius:8px;backdrop-filter:blur(10px)}
  @media(min-width:600px){.btn{width:110px;height:110px;border-radius:56px;font-size:32px}}
</style>
</head>
<body>
<div id=game-wrap></div>
<div class=center-ui id=status>LAP: 0 / 5 &nbsp; SPEED: 0 KPH &nbsp; RPM: 0</div>
<div class=hud id=hud>FUEL: 100% &nbsp; DAMAGE: 0% &nbsp; GEAR: N</div>
<canvas id="mini-map-canvas" class=mini-map></canvas>
<div class=ui>
  <div id=left class=btn>&larr;</div>
  <div id=right class=btn>&rarr;</div>
</div>
<div id=finish>🏁 FINISH! 🏁</div>
<div class=credits>Ultra 3D WebGL Racing • Advanced Physics • Procedural Track Design</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

// Scene setup
const container = document.getElementById('game-wrap');
const status = document.getElementById('status');
const hud = document.getElementById('hud');
const finishEl = document.getElementById('finish');
const miniMapCanvas = document.getElementById('mini-map-canvas');
const miniMapCtx = miniMapCanvas.getContext('2d');

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0a0e27, 500, 1500);
scene.background = new THREE.Color(0x0a0e27);

const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowShadowMap;
renderer.shadowMap.resolution = 2048;
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
container.appendChild(renderer.domElement);

// Post-processing
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, null);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
composer.addPass(bloomPass);

const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 8000);
camera.position.set(0, 10, -20);

// Advanced lighting
const ambientLight = new THREE.AmbientLight(0x8899ff, 0.6);
scene.add(ambientLight);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x2d5016, 0.8);
scene.add(hemi);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
sunLight.position.set(150, 200, 100);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(4096, 4096);
sunLight.shadow.camera.far = 2000;
sunLight.shadow.camera.left = -400;
sunLight.shadow.camera.right = 400;
sunLight.shadow.camera.top = 400;
sunLight.shadow.camera.bottom = -400;
sunLight.shadow.bias = -0.0001;
scene.add(sunLight);

// Additional accent light
const accentLight = new THREE.PointLight(0xff6b35, 0.8, 600);
accentLight.position.set(-100, 100, 200);
accentLight.castShadow = true;
scene.add(accentLight);

// High-quality road texture
function makeAdvancedRoadTexture(){
  const w = 2048, h = 2048;
  const c = document.createElement('canvas');
  c.width = w;
  c.height = h;
  const cx = c.getContext('2d');
  
  // Base asphalt
  const gradient = cx.createLinearGradient(0, 0, 0, h);
  gradient.addColorStop(0, '#1a1a1a');
  gradient.addColorStop(0.5, '#2d2d2d');
  gradient.addColorStop(1, '#1a1a1a');
  cx.fillStyle = gradient;
  cx.fillRect(0, 0, w, h);
  
  // Tire marks
  for(let i = 0; i < 50; i++){
    cx.fillStyle = `rgba(0,0,0,${Math.random()*0.3})`;
    cx.fillRect(Math.random()*w, Math.random()*h, Math.random()*100, Math.random()*8);
  }
  
  // Center dashed line (bright)
  cx.strokeStyle = '#ffff00';
  cx.lineWidth = 8;
  cx.setLineDash([60, 40]);
  cx.beginPath();
  cx.moveTo(w*0.48, 0);
  cx.lineTo(w*0.48, h);
  cx.stroke();
  
  // Edge lines (white)
  cx.strokeStyle = '#ffffff';
  cx.lineWidth = 6;
  cx.setLineDash([]);
  cx.beginPath();
  cx.moveTo(w*0.02, 0);
  cx.lineTo(w*0.02, h);
  cx.stroke();
  cx.beginPath();
  cx.moveTo(w*0.98, 0);
  cx.lineTo(w*0.98, h);
  cx.stroke();
  
  // High-frequency noise for realism
  const imgData = cx.getImageData(0, 0, w, h);
  const data = imgData.data;
  for(let i = 0; i < data.length; i += 4){
    const noise = (Math.random()-0.5)*40;
    data[i] += noise;
    data[i+1] += noise;
    data[i+2] += noise;
  }
  cx.putImageData(imgData, 0, 0);
  
  return new THREE.CanvasTexture(c);
}

const roadTex = makeAdvancedRoadTexture();
roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
roadTex.repeat.set(60, 1);

// Create advanced track with multiple curves
const trackLength = 5000;
const trackGeom = new THREE.PlaneGeometry(45, trackLength, 32, 1024);
trackGeom.rotateX(-Math.PI/2);

const pos = trackGeom.attributes.position;
for(let i = 0; i < pos.count; i++){
  const z = pos.getY(i);
  const t = (z + trackLength/2) / trackLength;
  const curve = Math.sin(t * Math.PI * 2.5) * 8 + 
                Math.sin(t * Math.PI * 4) * 3 + 
                Math.cos(t * Math.PI * 1.3) * 2;
  const elevation = Math.sin(t * Math.PI * 3) * 1.2;
  pos.setX(i, pos.getX(i) + curve);
  pos.setZ(i, pos.getZ(i) + elevation * 0.3);
}
trackGeom.computeVertexNormals();

const trackMat = new THREE.MeshStandardMaterial({
  map: roadTex,
  metalness: 0.15,
  roughness: 0.85,
  side: THREE.DoubleSide
});
const trackMesh = new THREE.Mesh(trackGeom, trackMat);
trackMesh.receiveShadow = true;
trackMesh.castShadow = true;
scene.add(trackMesh);

// Pit lane with distinct marking
const pitGeom = new THREE.PlaneGeometry(14, 1000, 1, 128);
pitGeom.rotateX(-Math.PI/2);
const pitMat = new THREE.MeshStandardMaterial({color: 0x662211, metalness: 0.1, roughness: 0.9});
const pitMesh = new THREE.Mesh(pitGeom, pitMat);
pitMesh.position.set(30, -0.1, -600);
pitMesh.receiveShadow = true;
scene.add(pitMesh);

// Curbing
function addCurb(x, z, len){
  const curbGeo = new THREE.BoxGeometry(0.8, 0.4, len);
  const curbMat = new THREE.MeshStandardMaterial({color: 0xff3300, metalness: 0.2, roughness: 0.6});
  const curb = new THREE.Mesh(curbGeo, curbMat);
  curb.position.set(x, 0.2, z);
  curb.castShadow = true;
  curb.receiveShadow = true;
  scene.add(curb);
}
addCurb(-24, 0, trackLength);
addCurb(24, 0, trackLength);

// Barrier system
function addBarrier(x, z){
  const barrierGeo = new THREE.BoxGeometry(0.5, 1.5, 8);
  const barrierMat = new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.3, roughness: 0.5});
  const barrier = new THREE.Mesh(barrierGeo, barrierMat);
  barrier.position.set(x, 0.75, z);
  barrier.castShadow = true;
  barrier.receiveShadow = true;
  scene.add(barrier);
}
for(let z = -trackLength/2; z < trackLength/2; z += 100){
  addBarrier(-27, z);
  addBarrier(27, z + 50);
}

// Advanced car model with better design
function makeDetailedCar(color = 0xff3333){
  const car = new THREE.Group();
  
  // Materials
  const bodyMat = new THREE.MeshStandardMaterial({color, metalness: 0.9, roughness: 0.2});
  const blackMat = new THREE.MeshStandardMaterial({color: 0x0a0a0a, metalness: 0.7, roughness: 0.3});
  const glassMat = new THREE.MeshStandardMaterial({color: 0x1a2a4a, metalness: 0.1, roughness: 0.05, transparent: true, opacity: 0.8});
  const wheelMat = new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.6, roughness: 0.4});
  
  // Main chassis - sleek formula-1 style
  const chassisGeo = new THREE.BoxGeometry(2.8, 0.4, 5.2);
  const chassis = new THREE.Mesh(chassisGeo, bodyMat);
  chassis.position.y = 0.7;
  chassis.castShadow = true;
  chassis.receiveShadow = true;
  car.add(chassis);
  
  // Front wing - aerodynamic
  const frontWingGeo = new THREE.BoxGeometry(3.2, 0.1, 0.4);
  const frontWing = new THREE.Mesh(frontWingGeo, blackMat);
  frontWing.position.set(0, 0.5, 2.4);
  frontWing.castShadow = true;
  frontWing.receiveShadow = true;
  car.add(frontWing);
  
  // Rear wing - high downforce
  const rearWingGeo = new THREE.BoxGeometry(2.2, 0.15, 0.5);
  const rearWing = new THREE.Mesh(rearWingGeo, blackMat);
  rearWing.position.set(0, 0.55, -2.5);
  rearWing.castShadow = true;
  rearWing.receiveShadow = true;
  car.add(rearWing);
  
  // Cockpit - transparent
  const cockpitGeo = new THREE.BoxGeometry(1.4, 0.5, 1.8);
  const cockpit = new THREE.Mesh(cockpitGeo, glassMat);
  cockpit.position.set(0, 1.1, -0.3);
  cockpit.castShadow = true;
  cockpit.receiveShadow = true;
  car.add(cockpit);
  
  // Side pods
  for(const side of [-1, 1]){
    const podGeo = new THREE.BoxGeometry(0.4, 0.6, 2.2);
    const pod = new THREE.Mesh(podGeo, bodyMat);
    pod.position.set(side * 1.6, 0.5, -0.5);
    pod.castShadow = true;
    pod.receiveShadow = true;
    car.add(pod);
  }
  
  // Nose cone
  const noseGeo = new THREE.ConeGeometry(0.8, 1.2, 12);
  const nose = new THREE.Mesh(noseGeo, bodyMat);
  nose.position.set(0, 0.7, 2.8);
  nose.castShadow = true;
  nose.receiveShadow = true;
  car.add(nose);
  
  // Advanced wheels with rim detail
  const wheelGeo = new THREE.CylinderGeometry(0.42, 0.42, 0.52, 32);
  wheelGeo.rotateZ(Math.PI/2);
  
  // Rim
  const rimGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.48, 32);
  rimGeo.rotateZ(Math.PI/2);
  const rimMat = new THREE.MeshStandardMaterial({color: 0x444444, metalness: 0.8, roughness: 0.3});
  
  for(const dx of [-1, 1]){
    for(const dz of [-1.6, 1.6]){
      const w = new THREE.Mesh(wheelGeo, wheelMat);
      w.position.set(dx * 1.4, 0.42, dz);
      w.castShadow = true;
      w.receiveShadow = true;
      car.add(w);
      
      const rim = new THREE.Mesh(rimGeo, rimMat);
      rim.position.set(dx * 1.4, 0.42, dz);
      car.add(rim);
    }
  }
  
  // Headlights
  const lightGeo = new THREE.SphereGeometry(0.15, 16, 16);
  const lightMat = new THREE.MeshStandardMaterial({color: 0xffff99, emissive: 0xffff00, emissiveIntensity: 0.8});
  for(const side of [-1, 1]){
    const light = new THREE.Mesh(lightGeo, lightMat);
    light.position.set(side * 1.1, 0.8, 2.6);
    light.castShadow = true;
    car.add(light);
    
    const headlight = new THREE.PointLight(0xffff99, 0.5, 100);
    headlight.position.copy(light.position);
    car.add(headlight);
  }
  
  // Race number
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const cx = canvas.getContext('2d');
  cx.fillStyle = '#ffffff';
  cx.fillRect(0, 0, 256, 256);
  cx.fillStyle = '#000000';
  cx.font = 'bold 180px Arial';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(Math.floor(Math.random()*99), 128, 128);
  
  const tex = new THREE.CanvasTexture(canvas);
  const plateMat = new THREE.MeshStandardMaterial({map: tex});
  const plate = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.8), plateMat);
  plate.position.set(0, 1.15, -0.7);
  car.add(plate);
  
  return car;
}

const playerCar = makeDetailedCar(0xe53935);
playerCar.position.set(0, 0.5, 120);
scene.add(playerCar);

// AI opponents
const opponents = [];
const opponentColors = [0x0d47a1, 0xffc107, 0x2e7d32];
for(let i = 0; i < 3; i++){
  const c = makeDetailedCar(opponentColors[i]);
  c.position.set((i - 1) * 4, 0.5, 250 + i * 50);
  scene.add(c);
  opponents.push({mesh: c, progress: 250 + i * 50, speed: 55 + Math.random() * 8});
}

// Camera chase
const chaseOffset = new THREE.Vector3(0, 8, -16);

// Input handling
let keys = {left: 0, right: 0};
let touchLeft = false, touchRight = false;

const leftBtn = document.getElementById('left');
const rightBtn = document.getElementById('right');

leftBtn.addEventListener('pointerdown', e => {e.preventDefault(); touchLeft = true});
leftBtn.addEventListener('pointerup', () => {touchLeft = false});
leftBtn.addEventListener('pointercancel', () => {touchLeft = false});

rightBtn.addEventListener('pointerdown', e => {e.preventDefault(); touchRight = true});
rightBtn.addEventListener('pointerup', () => {touchRight = false});
rightBtn.addEventListener('pointercancel', () => {touchRight = false});

window.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft') keys.left = 1;
  if(e.key === 'ArrowRight') keys.right = 1;
});

window.addEventListener('keyup', e => {
  if(e.key === 'ArrowLeft') keys.left = 0;
  if(e.key === 'ArrowRight') keys.right = 0;
});

let activePointer = null;
renderer.domElement.addEventListener('pointerdown', e => {
  activePointer = e.pointerId;
  renderer.domElement.setPointerCapture(activePointer);
  handlePointer(e);
});

renderer.domElement.addEventListener('pointermove', e => {
  if(e.pointerId === activePointer) handlePointer(e);
});

renderer.domElement.addEventListener('pointerup', e => {
  if(e.pointerId === activePointer){
    releasePointer();
    activePointer = null;
  }
});

renderer.domElement.addEventListener('pointercancel', e => {
  if(e.pointerId === activePointer){
    releasePointer();
    activePointer = null;
  }
});

function handlePointer(e){
  const rect = renderer.domElement.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  if(x < 0.45){
    touchLeft = true;
    touchRight = false;
  } else if(x > 0.55){
    touchLeft = false;
    touchRight = true;
  }
}

function releasePointer(){
  touchLeft = touchRight = false;
}

// Game variables
let playerX = 0;
let speed = 0;
let distance = 0;
let laps = 0;
const maxLaps = 5;
let fuel = 100;
let damage = 0;
let gear = 'N';
let lastTime = performance.now();

// Resize handler
function onWindowResize(){
  const w = window.innerWidth;
  const h = window.innerHeight;
  renderer.setSize(w, h);
  composer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', onWindowResize);
onWindowResize();

// Track position calculation
function trackPosition(progress){
  const t = (progress % trackLength) / trackLength;
  const z = (t - 0.5) * trackLength;
  const x = Math.sin(t * Math.PI * 2.5) * 8 + 
            Math.sin(t * Math.PI * 4) * 3 + 
            Math.cos(t * Math.PI * 1.3) * 2;
  const elevation = Math.sin(t * Math.PI * 3) * 1.2;
  return new THREE.Vector3(x, elevation * 0.3, z);
}

// Mini map update
function updateMiniMap(){
  miniMapCtx.fillStyle = '#1a1a1a';
  miniMapCtx.fillRect(0, 0, 120, 120);
  
  miniMapCtx.strokeStyle = '#666666';
  miniMapCtx.beginPath();
  miniMapCtx.arc(60, 60, 50, 0, Math.PI * 2);
  miniMapCtx.stroke();
  
  // Player
  miniMapCtx.fillStyle = '#e53935';
  const playerAngle = (distance / trackLength) * Math.PI * 2;
  miniMapCtx.fillRect(60 + Math.cos(playerAngle) * 45 - 2, 60 + Math.sin(playerAngle) * 45 - 2, 4, 4);
  
  // Opponents
  opponents.forEach((opp, idx) => {
    miniMapCtx.fillStyle = ['#0d47a1', '#ffc107', '#2e7d32'][idx];
    const oppAngle = (opp.progress / trackLength) * Math.PI * 2;
    miniMapCtx.fillRect(60 + Math.cos(oppAngle) * 45 - 2, 60 + Math.sin(oppAngle) * 45 - 2, 4, 4);
  });
}

// Physics-based gameplay
let steerAngle = 0;
const maxSteer = 0.15;

function animate(now){
  const dt = Math.min(50, now - lastTime) / 1000;
  lastTime = now;
  
  // Input
  let steerInput = 0;
  if(keys.left) steerInput -= 1;
  if(keys.right) steerInput += 1;
  if(touchLeft) steerInput -= 1;
  if(touchRight) steerInput += 1;
  
  // Smooth steering
  steerAngle += (steerInput * maxSteer - steerAngle) * 8 * dt;
  steerAngle = Math.max(-maxSteer, Math.min(maxSteer, steerAngle));
  
  // Speed dynamics
  const targetSpeed = 75;
  speed += (targetSpeed - speed) * 0.6 * dt;
  speed = Math.max(20, speed);
  
  // Distance and lap tracking
  distance += speed * dt * 2.8;
  
  // Lateral physics with drift
  const driftFactor = Math.abs(steerAngle) * 2;
  playerX += steerAngle * 8 * dt;
  playerX += -playerX * (2 + driftFactor) * dt;
  playerX = Math.max(-8, Math.min(8, playerX));
  
  // Update car position and rotation
  const pos = trackPosition(distance);
  playerCar.position.lerp(new THREE.Vector3(pos.x + playerX, pos.y + 0.5, pos.z), 0.85);
  playerCar.rotation.y = -Math.atan2(playerX, 10) * 0.6 + Math.atan2(steerAngle, 1) * 0.3;
  
  // Tilt car based on steer
  playerCar.rotation.z = steerAngle * 0.2;
  
  // Update opponents with better AI
  opponents.forEach((opp, idx) => {
    opp.progress += opp.speed * dt * 2.8;
    const tp = trackPosition(opp.progress);
    const sway = Math.sin(now * 0.001 + idx * 1.5) * 1.2;
    opp.mesh.position.lerp(new THREE.Vector3(tp.x + sway, tp.y + 0.5, tp.z), 0.6);
    opp.mesh.rotation.y = -Math.atan2(sway, 10) * 0.3;
  });
  
  // Advanced camera following
  const desiredPos = new THREE.Vector3().copy(playerCar.position).add(
    new THREE.Vector3(0, 8, -16).applyQuaternion(playerCar.quaternion)
  );
  camera.position.lerp(desiredPos, 0.08);
  camera.lookAt(new THREE.Vector3().copy(playerCar.position).add(new THREE.Vector3(0, 2.5, 0)));
  
  // Update HUD
  renderPass.camera = camera;
  const lap = Math.min(Math.floor(distance / trackLength) + 1, maxLaps);
  const rpm = Math.round((speed / 75) * 8000);
  gear = Math.floor((speed / 75) * 5) < 1 ? 'N' : String(Math.floor((speed / 75) * 5));
  
  status.textContent = `LAP: ${lap} / ${maxLaps}   SPEED: ${Math.round(speed * 1.8)} KPH   RPM: ${rpm}`;
  hud.textContent = `FUEL: ${Math.max(0, Math.round(100 - distance * 0.003))}%   DAMAGE: ${Math.round(damage)}%   GEAR: ${gear}`;
  
  if(lap >= maxLaps){
    finishEl.style.display = 'block';
  } else {
    finishEl.style.display = 'none';
  }
  
  updateMiniMap();
  
  // Render with post-processing
  composer.render();
  
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

</script>
</body>
</html>
