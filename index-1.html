
<!DOCTYPE html><html><head><meta charset="utf-8"><title>Open Wheel Racer</title>
<style>
body{margin:0;background:#222}canvas{display:block;margin:auto;background:#6bb}
</style></head><body>
<canvas id=c width=900 height=600></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let px=450,laps=0,off=0,keys={};onkeydown=e=>keys[e.key]=1;onkeyup=e=>keys[e.key]=0;
function car(cx,cy,col){x.fillStyle=col;x.fillRect(cx-8,cy-20,16,40);x.fillRect(cx-18,cy-10,36,20);x.fillStyle="#111";[-16,16].forEach(dx=>{x.fillRect(cx+dx-3,cy-18,6,10);x.fillRect(cx+dx-3,cy+8,6,10);});}
function loop(){
 if(keys.ArrowLeft)px-=5;if(keys.ArrowRight)px+=5;off+=4;if(off>500){off=0;laps=Math.min(5,laps+1);}
 x.fillStyle="#2a2";x.fillRect(0,0,900,600);
 x.fillStyle="#555";x.fillRect(150,0,600,600);
 x.fillStyle="#bbb";x.fillRect(140,0,10,600);x.fillRect(750,0,10,600);
 x.fillStyle="#c00";
 for(let y=-40;y<640;y+=80){x.fillRect(170,y+off%80,120,20);x.fillRect(610,y+off%80,120,20);x.fillStyle="#fff";x.font="16px Arial";x.fillText("COME COOK WITH ALFIE",180,y+15+off%80);x.fillStyle="#c00";}
 x.fillStyle="#777";x.fillRect(0,20,140,120);x.fillRect(760,20,140,120);
 for(let i=0;i<40;i++){x.fillStyle=i%2?"#44f":"#ff4";x.fillRect((i%10)*12+10,30+Math.floor(i/10)*12,8,8);x.fillRect(770+(i%10)*12,30+Math.floor(i/10)*12,8,8);}
 car(px,500,"red");car(380,250,"blue");car(520,180,"black");
 x.fillStyle="#fff";x.font="24px Arial";x.fillText("Lap: "+laps+"/5",20,580);
 if(laps>=5){x.font="48px Arial";x.fillText("FINISH!",360,300);}
 requestAnimationFrame(loop);}
loop();
</script></body></html>
