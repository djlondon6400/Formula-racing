<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Open Wheel Racer — WebGL 3D</title>
<style>
  html,body{height:100%;margin:0;background:#05060a;color:#fff;font-family:Inter,Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}
  #game-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block; width:100%; height:100%}
  .ui{position:fixed;left:0;right:0;bottom:10px;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none}
  .btn{width:86px;height:86px;border-radius:44px;background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.02));display:flex;align-items:center;justify-content:center;font-size:28px;pointer-events:auto;color:#fff;user-select:none}
  .center-ui{position:fixed;left:50%;transform:translateX(-50%);top:10px;background:rgba(0,0,0,0.45);padding:8px 12px;border-radius:8px;font-weight:600}
  .hud{position:fixed;right:12px;top:70px;background:rgba(0,0,0,0.45);padding:8px 12px;border-radius:8px;text-align:right}
  .credits{position:fixed;left:10px;bottom:10px;opacity:0.6;font-size:12px}
  #finish{position:fixed;left:50%;top:40%;transform:translateX(-50%);font-size:48px;display:none;padding:12px 20px;border-radius:8px;background:linear-gradient(90deg,#ffb703,#fb8500);color:#111}
  @media(min-width:600px){.btn{width:110px;height:110px;border-radius:56px;font-size:32px}}
</style>
</head>
<body>
<div id=game-wrap></div>
<div class=center-ui id=status>Lap: 0 / 5 &nbsp; Speed: 0</div>
<div class=hud id=hud>Fuel: 100% &nbsp; Damage: 0%</div>
<div class=ui>
  <div id=left class=btn>&larr;</div>
  <div id=right class=btn>&rarr;</div>
</div>
<div id=finish>FINISH!</div>
<div class=credits>3D WebGL: three.js — procedural car & track</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.154.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.154.0/examples/jsm/controls/OrbitControls.js';

// Basic scene setup
const container = document.getElementById('game-wrap');
const status = document.getElementById('status');
const hud = document.getElementById('hud');
const finishEl = document.getElementById('finish');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x061026);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.setPixelRatio(Math.max(1, window.devicePixelRatio || 1));
container.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 5000);
camera.position.set(0, 8, -18);

// Lighting
const hemi = new THREE.HemisphereLight(0xbfd1ff, 0x20252a, 0.7);
scene.add(hemi);
const dir = new THREE.DirectionalLight(0xffffff, 1.1);
dir.position.set(10, 30, -10);
dir.castShadow = true;
dir.shadow.mapSize.set(2048,2048);
scene.add(dir);

// Simple track texture generated on a canvas
function makeRoadTexture(){
  const w = 1024, h = 1024;
  const c = document.createElement('canvas'); c.width = w; c.height = h; const cx = c.getContext('2d');
  cx.fillStyle = '#2b2b2b'; cx.fillRect(0,0,w,h);
  // draw center dashed line
  cx.fillStyle = '#f8f4e3';
  for(let i=0;i<20;i++){ cx.fillRect(w*0.48, i*(h/20) + 8, w*0.04, (h/20)*0.4); }
  // add subtle noise
  for(let i=0;i<12000;i++){ cx.fillStyle = 'rgba(0,0,0,' + (Math.random()*0.06) + ')'; cx.fillRect(Math.random()*w, Math.random()*h, 1,1); }
  return new THREE.CanvasTexture(c);
}

const roadTex = makeRoadTexture(); roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping; roadTex.repeat.set(40,1);

// Create long plane for track
const trackLength = 4200;
const trackGeom = new THREE.PlaneGeometry(40, trackLength, 16, 512);
trackGeom.rotateX(-Math.PI/2);
// Bend track geometry to make a winding path
const pos = trackGeom.attributes.position;
for(let i=0;i<pos.count;i++){
  const z = pos.getY(i);
  const t = (z + trackLength/2) / trackLength;
  const curve = Math.sin(t * Math.PI * 2) * 6 + Math.sin(t * Math.PI * 6) * 1.5;
  pos.setX(i, pos.getX(i) + curve);
}
trackGeom.computeVertexNormals();
const trackMat = new THREE.MeshStandardMaterial({map:roadTex, metalness:0.1, roughness:0.7});
const trackMesh = new THREE.Mesh(trackGeom, trackMat);
trackMesh.receiveShadow = true;
scene.add(trackMesh);

// Pit lane: separate plane to the right
const pitGeom = new THREE.PlaneGeometry(10, 800, 1, 64);
pitGeom.rotateX(-Math.PI/2);
for(let i=0;i<pitGeom.attributes.position.count;i++){
  const z = pitGeom.attributes.position.getY(i);
  pitGeom.attributes.position.setX(i, pitGeom.attributes.position.getX(i) + 10); // offset to right of track
}
const pitMat = new THREE.MeshStandardMaterial({color:0x444445, metalness:0.05, roughness:0.8});
const pitMesh = new THREE.Mesh(pitGeom, pitMat);
pitMesh.position.z = -trackLength*0.22;
pitMesh.receiveShadow = true;
scene.add(pitMesh);

// Simple roadside objects (barriers)
function addBarrier(x,z){ const m = new THREE.Mesh(new THREE.BoxGeometry(0.6,1.2,6), new THREE.MeshStandardMaterial({color:0x202020, metalness:0.1, roughness:0.8})); m.position.set(x,0.6,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); }
for(let z=-2000; z<=2000; z+=80){ addBarrier(-20, z); addBarrier(20, z+20); }

// Procedural car model (group)
function makeCar(color=0xff3333){
  const car = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({color, metalness:0.8, roughness:0.2});
  const blackMat = new THREE.MeshStandardMaterial({color:0x0b0b0b, metalness:0.6, roughness:0.4});
  const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.6,0.35,4.6), bodyMat);
  chassis.position.y = 0.6; chassis.castShadow=true; chassis.receiveShadow=true; car.add(chassis);
  // cockpit
  const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.2,0.4,1.6), new THREE.MeshStandardMaterial({color:0x223344, metalness:0.1, roughness:0.05, opacity:0.95, transparent:true}));
  cockpit.position.set(0,0.9,-0.2); cockpit.castShadow=true; car.add(cockpit);
  // wings
  const wingF = new THREE.Mesh(new THREE.BoxGeometry(2.4,0.08,0.26), blackMat); wingF.position.set(0,0.48,1.9); wingF.castShadow=true; car.add(wingF);
  const wingR = new THREE.Mesh(new THREE.BoxGeometry(1.6,0.08,0.3), blackMat); wingR.position.set(0,0.48,-2.3); wingR.castShadow=true; car.add(wingR);
  // wheels
  const wheelGeo = new THREE.CylinderGeometry(0.35,0.35,0.45,20);
  wheelGeo.rotateZ(Math.PI/2);
  for(const dx of [-1,1]){
    for(const dz of [-1.4,1.4]){
      const w = new THREE.Mesh(wheelGeo, blackMat);
      w.position.set(dx*1.25,0.35,dz); w.castShadow=true; car.add(w);
    }
  }
  // number decal (using canvas texture)
  const canvas = document.createElement('canvas'); canvas.width=128; canvas.height=128; const cx = canvas.getContext('2d'); cx.fillStyle='white'; cx.fillRect(0,0,128,128); cx.fillStyle='black'; cx.font='bold 80px Arial'; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('7',64,68);
  const tex = new THREE.CanvasTexture(canvas);
  const plate = new THREE.Mesh(new THREE.PlaneGeometry(0.6,0.6), new THREE.MeshBasicMaterial({map:tex})); plate.position.set(0,0.95,-0.6); car.add(plate);
  return car;
}

const playerCar = makeCar(0xe53935);
playerCar.position.set(0, 0, 120);
scene.add(playerCar);

// Opponents
const opponents = [];
for(let i=0;i<3;i++){ const c = makeCar([0x0d47a1,0xffb300,0x2e7d32][i]); c.position.set((i-1)*3,0, 200 + i*40); scene.add(c); opponents.push(c); }

// Camera chase variables
const chaseOffset = new THREE.Vector3(0,6,-14);

// Controls and input
let keys = {left:0,right:0};
let touchLeft=false, touchRight=false;
const leftBtn = document.getElementById('left');
const rightBtn = document.getElementById('right');
leftBtn.addEventListener('pointerdown', e=>{e.preventDefault(); touchLeft=true}); leftBtn.addEventListener('pointerup', e=>{ touchLeft=false});
leftBtn.addEventListener('pointercancel', ()=>{ touchLeft=false});
rightBtn.addEventListener('pointerdown', e=>{e.preventDefault(); touchRight=true}); rightBtn.addEventListener('pointerup', e=>{ touchRight=false});
rightBtn.addEventListener('pointercancel', ()=>{ touchRight=false});
window.addEventListener('keydown', e=>{ if(e.key==='ArrowLeft') keys.left=1; if(e.key==='ArrowRight') keys.right=1; });
window.addEventListener('keyup', e=>{ if(e.key==='ArrowLeft') keys.left=0; if(e.key==='ArrowRight') keys.right=0; });

// Touch steering on canvas
let activePointer=null;
renderer.domElement.addEventListener('pointerdown', e=>{ activePointer=e.pointerId; renderer.domElement.setPointerCapture(activePointer); handlePointer(e); });
renderer.domElement.addEventListener('pointermove', e=>{ if(e.pointerId===activePointer) handlePointer(e); });
renderer.domElement.addEventListener('pointerup', e=>{ if(e.pointerId===activePointer){ releasePointer(); activePointer=null;} });
renderer.domElement.addEventListener('pointercancel', e=>{ if(e.pointerId===activePointer){ releasePointer(); activePointer=null;} });
function handlePointer(e){ const rect = renderer.domElement.getBoundingClientRect(); const x=(e.clientX-rect.left)/rect.width; if(x<0.45){ touchLeft=true; touchRight=false; } else if(x>0.55){ touchRight=true; touchLeft=false; } else { touchLeft=touchRight=false; } }
function releasePointer(){ touchLeft=touchRight=false; }

// Game variables
let playerX = 0; // lateral offset
let speed = 0; let distance = 0; let laps = 0; const maxLaps = 5; let fuel = 100, damage = 0;

// Resize handler
function onWindowResize(){ const w = window.innerWidth; const h = window.innerHeight; renderer.setSize(w,h); camera.aspect = w/h; camera.updateProjectionMatrix(); }
window.addEventListener('resize', onWindowResize); onWindowResize();

// Utility: world position on track by progress
function trackPosition(progress){ // progress in meters along track
  const t = (progress % trackLength) / trackLength; const z = (t-0.5) * trackLength; const x = Math.sin(t*Math.PI*2)*6 + Math.sin(t*Math.PI*6)*1.5; return new THREE.Vector3(x, 0, z);
}

// Main loop
let last = performance.now();
function animate(now){
  const dt = Math.min(50, now - last) / 1000; last = now;
  // input
  let steer = 0; if(keys.left) steer -=1; if(keys.right) steer +=1; if(touchLeft) steer -=1; if(touchRight) steer +=1;
  // update speed (simple)
  const targetSpeed = 60; speed += (targetSpeed - speed) * 0.8 * dt; if(speed < 6) speed = 6;
  distance += speed * dt * 2.4; // scale to track meters
  // lateral physics
  playerX += steer * 6 * dt; playerX += -playerX * 2.5 * dt; playerX = Math.max(-6, Math.min(6, playerX));

  // position the car along the track
  const pos = trackPosition(distance);
  playerCar.position.lerp(new THREE.Vector3(pos.x + playerX, 0.2, pos.z), 0.8);
  // tilt the car body when steering
  playerCar.rotation.y = -Math.atan2(playerX, 8) * 0.5;

  // move opponents forward slowly
  opponents.forEach((o, idx)=>{
    const pz = (distance + 200 + idx*40) % trackLength; const tp = trackPosition(pz);
    o.position.lerp(new THREE.Vector3(tp.x + Math.sin(now*0.001 + idx)*1.6 + idx*2, 0.2, tp.z), 0.4);
    o.rotation.y = -Math.atan2(Math.sin(now*0.001 + idx)*0.2, 8);
  });

  // camera chase
  const desiredPos = new THREE.Vector3().copy(playerCar.position).add(new THREE.Vector3(0,6,-14).applyQuaternion(playerCar.quaternion));
  camera.position.lerp(desiredPos, 0.12);
  camera.lookAt(new THREE.Vector3().copy(playerCar.position).add(new THREE.Vector3(0,2,0)));

  // HUD
  const lap = Math.min(Math.floor(distance/trackLength)+1, maxLaps);
  status.textContent = `Lap: ${lap} / ${maxLaps}   Speed: ${Math.round(speed*2)} `;
  hud.textContent = `Fuel: ${Math.max(0,Math.round(100 - distance*0.004))}%   Damage: ${Math.round(damage)}%`;
  if(lap >= maxLaps) finishEl.style.display = 'block'; else finishEl.style.display = 'none';

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

</script>
</body>
</html>
